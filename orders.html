<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моите Поръчки | GKS STORE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/logo.jpg">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <div class="logo-bg">
                    <img src="images/logo.png" alt="GKS Store Logo" class="navbar-logo">
                </div>
                <span>STORE</span>
            </a>
        </div>
        <button id="nav-toggle" class="nav-toggle" aria-label="Смени меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Начало</a></li>
            <li><a href="product.html">Продукти</a></li>
            <li id="auth-status"></li>
            <li><a href="#" id="cart-icon">🛒 <span id="cart-count">0</span></a></li>
        </ul>
    </nav>

    <main class="catalog">
        <div class="hero-content" style="text-align:center; margin-bottom:50px;" data-aos="fade-down">
            <h1>МОИТЕ <span>ПОРЪЧКИ</span></h1>
            <p style="color:var(--text-gray); margin-top:12px;">Следи статуса на всяка поръчка в реално време.</p>
        </div>
        <div id="orders-container" class="orders-list">
            <p
                style="text-align:center; opacity:0.4; font-family:var(--font-condensed); letter-spacing:2px; text-transform:uppercase;">
                Зареждане...
            </p>
        </div>
    </main>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Твоят избор</h3>
            <span id="close-cart">&times;</span>
        </div>
        <div id="cart-items" class="cart-items-container"></div>
        <div class="cart-footer">
            <div class="total-price">Общо: <span id="cart-total">0.00</span> €</div>
            <button id="checkout-btn" class="cta-btn">ПОРЪЧАЙ СЕГА</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const auth = getAuth();
        const db = getFirestore();

        const STATUS_STEPS = ['Приета', 'Обработва се', 'Изпратена', 'Доставена'];
        const STATUS_ICONS = ['✓', '⚙', '🚚', '✅'];

        // Map any status string to step index
        function getStepIndex(status) {
            const map = {
                'pending': 0, 'приета': 0,
                'processing': 1, 'обработва се': 1,
                'shipped': 2, 'изпратена': 2,
                'delivered': 3, 'доставена': 3,
            };
            return map[(status || '').toLowerCase()] ?? 0;
        }

        function buildTracker(status) {
            const currentIdx = getStepIndex(status);
            return `<div class="status-tracker">
                ${STATUS_STEPS.map((step, i) => {
                const cls = i < currentIdx ? 'done' : i === currentIdx ? 'current' : '';
                return `<div class="tracker-step ${cls}">
                        <div class="tracker-dot">${i <= currentIdx ? STATUS_ICONS[i] : ''}</div>
                        <div class="tracker-label">${step}</div>
                    </div>`;
            }).join('')}
            </div>`;
        }

        function formatDate(ts) {
            if (!ts) return '';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('bg-BG', { day: '2-digit', month: 'long', year: 'numeric' });
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const container = document.getElementById('orders-container');
            try {
                const q = query(collection(db, "orders"), where("userId", "==", user.uid));
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    container.innerHTML = `<div style="text-align:center; padding:80px 20px; font-family:var(--font-condensed); letter-spacing:2px; text-transform:uppercase; color:var(--text-gray);">
                        <div style="font-size:3rem; margin-bottom:20px; opacity:0.3;">📦</div>
                        Нямате поръчки все още.<br>
                        <a href="product.html" style="color:var(--cyan); text-decoration:none; margin-top:16px; display:inline-block;">Разгледай каталога →</a>
                    </div>`;
                    return;
                }
                container.innerHTML = '';
                const orders = [];
                snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                // Sort by date desc
                orders.sort((a, b) => {
                    const da = a.date?.toDate ? a.date.toDate() : new Date(a.date || 0);
                    const db2 = b.date?.toDate ? b.date.toDate() : new Date(b.date || 0);
                    return db2 - da;
                });
                orders.forEach(order => {
                    const items = (order.items || []).map(i => `${i.name} × Размер ${i.size}`).join(', ');
                    container.innerHTML += `
                        <div class="order-card" data-aos="fade-up">
                            <div class="order-top">
                                <div class="order-info">
                                    <h3>Поръчка #${order.id.substring(0, 8).toUpperCase()}</h3>
                                    <div class="order-date">${formatDate(order.date)}</div>
                                </div>
                            </div>
                            ${buildTracker(order.status)}
                            <div class="order-items-list">
                                <strong>Артикули</strong>
                                ${items || '—'}
                            </div>
                        </div>`;
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = '<p style="text-align:center; color:#ff4444;">Грешка при зареждане.</p>';
            }
        });
    </script>
</body>

</html>
