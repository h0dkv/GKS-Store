<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моите Поръчки | GKS STORE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/logo.jpg">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html">
                <div class="logo-bg">
                    <img src="images/logo.png" alt="GKS Store Logo" class="navbar-logo">
                </div>
                <span>STORE</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Начало</a></li>
            <li><a href="product.html">Продукти</a></li>
            <li id="auth-status"></li>
            <li><a href="#" id="cart-icon">🛒 <span id="cart-count">0</span></a></li>
        </ul>
    </nav>

    <main class="catalog">
        <div class="hero-content" style="text-align: center; margin-bottom: 50px;" data-aos="fade-down">
            <h1>МОИТЕ <span>ПОРЪЧКИ</span></h1>
            <p>Тук можете да следите статуса на вашите поръчки.</p>
        </div>

        <div id="orders-container" class="orders-list">
            <p style="text-align: center; opacity: 0.5;">Зареждане на поръчки...</p>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const auth = getAuth();
        const db = getFirestore();

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            const container = document.getElementById('orders-container');
            try {
                const q = query(collection(db, "orders"), where("userId", "==", user.uid));
                const snapshot = await getDocs(q);
                container.innerHTML = snapshot.empty ? '<p style="text-align:center;opacity:0.5;">Нямате поръчки.</p>' : '';
                snapshot.forEach(doc => {
                    const order = doc.data();
                    const items = order.items.map(i => `${i.name} (${i.size})`).join(', ');
                    container.innerHTML += `
                        <div class="order-card" data-aos="fade-up">
                            <div class="order-info">
                                <h3>Поръчка #${doc.id.substring(0, 6)}</h3>
                                <p>${items}</p>
                            </div>
                            <div class="order-status">${order.status}</div>
                        </div>`;
                });
            } catch (e) {
                console.error(e);
                container.innerHTML = '<p style="text-align:center;color:red;">Грешка при зареждане.</p>';
            }
        });
    </script>
</body>

</html>
